name: Web app CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        steps:
        - name: Checkout code
          uses: actions/checkout@v3

        - name: Set up Node.js
          uses: actions/setup-node@v3
          with:
            node-version: '22'

        - name: Install dependencies
          run: npm install

        - name: Run tests
          run: npm test || echo "No tests found"

        - name: Zip files for deployment
          run: zip -r app.zip . -x '*.git*' '*.github*'

        - name: Deploy to Azure Web App
          uses: azure/webapps-deploy@v2
          with:
            app-name: 'your-app-name' # Replace with your Azure Web App name
            publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }} # Set this secret in your repository settings
            package: app.zip

    